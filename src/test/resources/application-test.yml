# application-test.yml

server:
  port: ${SPRING_SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      enabled: true
            
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.reactive.ReactiveOAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.reactive.ReactiveOAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
    lazy-initialization: true

app:
  jwt:
    secret: dGVzdFNlY3JldEtleVRoYXRNdXN0QmVMb25nRW5vdWdoRm9ySFMyNTY= # Base64 test secret

logging:
  level:
    com.example: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.test: INFO

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

AUTH_SERVICE_ROUTES: ${AUTH_SERVICE_ROUTES:http://auth-service:8081}
PROTECTED_SERVICE_ROUTES: ${PROTECTED_SERVICE_ROUTES:http://protected-service:8082}